<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finance Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F7F5F0;color:#1A1714;min-height:100vh;padding-bottom:3rem}
.app{max-width:460px;margin:0 auto;padding:0 1rem}
h1{font-size:22px;font-weight:600;padding:1.5rem 0 1rem}
h1 span{color:#0F6E56;font-family:'DM Mono',monospace}

.card{background:#1A1714;color:#fff;border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.card-label{font-size:12px;color:rgba(255,255,255,0.45);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card-amount{font-family:'DM Mono',monospace;font-size:38px;font-weight:500;margin-bottom:1.25rem}
.card-amount.green{color:#5DCAA5}
.card-amount.red{color:#F0997B}
.mini-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mini{background:rgba(255,255,255,0.08);border-radius:10px;padding:10px 14px}
.mini-label{font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:3px}
.mini-val{font-family:'DM Mono',monospace;font-size:16px}
.mini-val.green{color:#5DCAA5}
.mini-val.red{color:#F0997B}

.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;background:#ECEAE4;border-radius:12px;padding:4px;margin-bottom:1rem}
.tab{padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:9px;color:#6B6560;transition:all .15s}
.tab.on{background:#fff;color:#1A1714;box-shadow:0 1px 4px rgba(0,0,0,.08)}

.sec{display:none}.sec.on{display:block}

.toggle{display:grid;grid-template-columns:1fr 1fr;border:1.5px solid #E2DDD5;border-radius:12px;overflow:hidden;margin-bottom:.75rem}
.tbtn{padding:10px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;background:#fff;color:#6B6560;border:none;transition:all .15s}
.tbtn.inc{background:#E1F5EE;color:#0F6E56}
.tbtn.exp{background:#FAECE7;color:#993C1D}

label{font-size:12px;font-weight:500;color:#6B6560;display:block;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;margin-top:.65rem}
input,select{width:100%;padding:10px 12px;font-size:14px;font-family:'DM Sans',sans-serif;border:1.5px solid #E2DDD5;border-radius:8px;background:#fff;color:#1A1714;outline:none}
input:focus,select:focus{border-color:#1A1714}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.btn{width:100%;padding:12px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;border-radius:12px;border:none;cursor:pointer;margin-top:.75rem}
.btn.inc{background:#E1F5EE;color:#0F6E56}
.btn.exp{background:#FAECE7;color:#993C1D}
.btn:active{transform:scale(.98)}

.tx-list{display:flex;flex-direction:column;gap:6px}
.month-title{font-size:12px;font-weight:600;color:#6B6560;text-transform:uppercase;letter-spacing:.5px;padding:.5rem 0 6px;border-bottom:1px solid #E2DDD5;margin-bottom:6px;display:flex;justify-content:space-between}
.tx{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1.5px solid #E2DDD5;border-radius:10px}
.tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-icon.inc{background:#E1F5EE}
.tx-icon.exp{background:#FAECE7}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:14px;font-weight:500}
.tx-meta{font-size:12px;color:#9E9890;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tx-amt{font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.tx-amt.inc{color:#0F6E56}
.tx-amt.exp{color:#993C1D}
.del{background:none;border:none;cursor:pointer;color:#9E9890;font-size:18px;padding:4px}
.del:hover{color:#993C1D}

.bar-wrap{background:#fff;border:1.5px solid #E2DDD5;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem}
.bar-title{font-size:13px;font-weight:600;color:#6B6560;text-transform:uppercase;letter-spacing:.4px;margin-bottom:1rem}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-lbl{font-size:12px;color:#6B6560;width:86px;flex-shrink:0;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:#F0EDE6;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;min-width:40px;transition:width .4s}
.bar-fill.exp{background:#F0997B}
.bar-fill.inc{background:#5DCAA5}
.bar-val{font-size:11px;font-weight:500;color:#fff;white-space:nowrap;font-family:'DM Mono',monospace}

.empty{text-align:center;padding:2rem;color:#9E9890;font-size:14px;line-height:1.8}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:#1A1714;color:#fff;padding:9px 20px;border-radius:99px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <h1>💸 <span>Finance</span> Tracker</h1>

  <div class="card">
    <div class="card-label">Total Balance</div>
    <div class="card-amount green" id="bal">₹0</div>
    <div class="mini-cards">
      <div class="mini"><div class="mini-label">↑ Income</div><div class="mini-val green" id="inc">₹0</div></div>
      <div class="mini"><div class="mini-label">↓ Expense</div><div class="mini-val red" id="exp">₹0</div></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab on" onclick="tab('add')">➕ Add</div>
    <div class="tab" onclick="tab('history')">📋 History</div>
    <div class="tab" onclick="tab('summary')">📊 Summary</div>
  </div>

  <!-- ADD -->
  <div id="sec-add" class="sec on">
    <div class="toggle">
      <button class="tbtn inc" id="b-inc" onclick="setType('income')">↑ Income</button>
      <button class="tbtn" id="b-exp" onclick="setType('expense')">↓ Expense</button>
    </div>
    <label>Amount (₹)</label>
    <input type="number" id="f-amt" placeholder="0" min="0"/>
    <div class="row">
      <div><label>Category</label><select id="f-cat"></select></div>
      <div><label>Date</label><input type="date" id="f-date"/></div>
    </div>
    <label>Note (optional)</label>
    <input type="text" id="f-note" placeholder="e.g. Lunch"/>
    <button class="btn inc" id="add-btn" onclick="addTx()">Add Income</button>
  </div>

  <!-- HISTORY -->
  <div id="sec-history" class="sec">
    <div class="tx-list" id="tx-list">
      <div class="empty">Koi transaction nahi hai abhi tak 👆</div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="sec-summary" class="sec">
    <div class="bar-wrap">
      <div class="bar-title">Category wise expenses</div>
      <div id="cat-bars"><div class="empty">Koi expense nahi hai.</div></div>
    </div>
    <div class="bar-wrap">
      <div class="bar-title">Monthly overview</div>
      <div id="month-bars"><div class="empty">Koi data nahi hai.</div></div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const API = "http://localhost:5000";
const ECATS = ["Food","Rent","Transport","Shopping","Entertainment","Health","Education","Other"];
const ICATS = ["Salary","Freelance","Business","Gift","Other"];
const EMOJI = {Food:"🍽️",Rent:"🏠",Transport:"🚗",Shopping:"🛍️",Entertainment:"🎬",Health:"❤️",Education:"📚",Salary:"💼",Freelance:"💻",Business:"🏪",Gift:"🎁",Other:"📌"};

let txType = "income";

function fmt(n){ return "₹"+Math.abs(n).toLocaleString("en-IN",{maximumFractionDigits:0}); }

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className="toast show";
  setTimeout(()=>t.className="toast",2200);
}

function setType(type){
  txType=type;
  document.getElementById("b-inc").className="tbtn"+(type==="income"?" inc":"");
  document.getElementById("b-exp").className="tbtn"+(type==="expense"?" exp":"");
  const btn=document.getElementById("add-btn");
  btn.className="btn "+(type==="income"?"inc":"exp");
  btn.textContent=type==="income"?"Add Income":"Add Expense";
  const cats=type==="income"?ICATS:ECATS;
  document.getElementById("f-cat").innerHTML=cats.map(c=>`<option>${c}</option>`).join("");
}

function tab(name){
  document.querySelectorAll(".tab").forEach((t,i)=>t.className="tab"+(["add","history","summary"][i]===name?" on":""));
  document.querySelectorAll(".sec").forEach(s=>s.className="sec");
  document.getElementById("sec-"+name).className="sec on";
  if(name==="history") loadHistory();
  if(name==="summary") loadSummary();
}

async function getStats(){
  try{
    const txs=await fetch(API+"/transactions").then(r=>r.json());
    const inc=txs.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
    const exp=txs.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
    const bal=inc-exp;
    document.getElementById("inc").textContent=fmt(inc);
    document.getElementById("exp").textContent=fmt(exp);
    const b=document.getElementById("bal");
    b.textContent=(bal>=0?"+":"-")+fmt(bal);
    b.className="card-amount "+(bal>=0?"green":"red");
  }catch(e){
    document.getElementById("bal").textContent="Server off?";
  }
}

async function addTx(){
  const amt=parseFloat(document.getElementById("f-amt").value);
  if(!amt||amt<=0){toast("⚠️ Amount daalo!");return;}
  const body={
    type:txType,
    category:document.getElementById("f-cat").value,
    amount:amt,
    date:document.getElementById("f-date").value||new Date().toISOString().split("T")[0],
    note:document.getElementById("f-note").value
  };
  await fetch(API+"/transactions",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  document.getElementById("f-amt").value="";
  document.getElementById("f-note").value="";
  getStats();
  toast("✅ "+(txType==="income"?"Income":"Expense")+" save ho gaya!");
}

async function loadHistory(){
  const list=document.getElementById("tx-list");
  const txs=await fetch(API+"/transactions").then(r=>r.json());
  if(!txs.length){list.innerHTML='<div class="empty">Koi transaction nahi hai abhi tak 👆</div>';return;}
  const byMonth={};
  txs.reverse().forEach(t=>{
    const key=new Date(t.date).toLocaleString("en-IN",{month:"long",year:"numeric"});
    if(!byMonth[key])byMonth[key]=[];
    byMonth[key].push(t);
  });
  list.innerHTML=Object.entries(byMonth).map(([month,items])=>{
    const bal=items.reduce((s,t)=>s+(t.type==="income"?t.amount:-t.amount),0);
    return`<div>
      <div class="month-title"><span>${month}</span><span style="color:${bal>=0?"#0F6E56":"#993C1D"};font-family:'DM Mono',monospace">${bal>=0?"+":"-"}${fmt(bal)}</span></div>
      ${items.map(t=>`<div class="tx">
        <div class="tx-icon ${t.type}">${EMOJI[t.category]||"📌"}</div>
        <div class="tx-info">
          <div class="tx-cat">${t.category}</div>
          <div class="tx-meta">${new Date(t.date).toLocaleDateString("en-IN",{day:"2-digit",month:"short"})}${t.note?" · "+t.note:""}</div>
        </div>
        <div class="tx-amt ${t.type}">${t.type==="income"?"+":"-"}${fmt(t.amount)}</div>
        <button class="del" onclick="delTx('${t.id}')">✕</button>
      </div>`).join("")}
    </div>`;
  }).join("");
}

async function delTx(id){
  if(!confirm("Delete karein?"))return;
  await fetch(API+"/transactions/"+id,{method:"DELETE"});
  getStats(); loadHistory();
  toast("🗑️ Delete ho gaya!");
}

async function loadSummary(){
  const txs=await fetch(API+"/transactions").then(r=>r.json());

  // Category bars
  const catEl=document.getElementById("cat-bars");
  const exp=txs.filter(t=>t.type==="expense");
  if(!exp.length){catEl.innerHTML='<div class="empty">Koi expense nahi hai.</div>';}
  else{
    const tots={};
    exp.forEach(t=>{tots[t.category]=(tots[t.category]||0)+t.amount;});
    const max=Math.max(...Object.values(tots));
    catEl.innerHTML=Object.entries(tots).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>`
      <div class="bar-row">
        <div class="bar-lbl">${EMOJI[cat]||"📌"} ${cat}</div>
        <div class="bar-track"><div class="bar-fill exp" style="width:${Math.round(amt/max*100)}%"><span class="bar-val">${fmt(amt)}</span></div></div>
      </div>`).join("");
  }

  // Monthly bars
  const mEl=document.getElementById("month-bars");
  if(!txs.length){mEl.innerHTML='<div class="empty">Koi data nahi hai.</div>';return;}
  const byM={};
  txs.forEach(t=>{
    const k=t.date.slice(0,7);
    if(!byM[k])byM[k]={income:0,expense:0};
    byM[k][t.type]+=t.amount;
  });
  const maxV=Math.max(...Object.values(byM).flatMap(v=>[v.income,v.expense]));
  mEl.innerHTML=Object.entries(byM).sort((a,b)=>b[0].localeCompare(a[0])).map(([ym,v])=>{
    const [yr,mo]=ym.split("-");
    const lbl=new Date(yr,mo-1).toLocaleString("en-IN",{month:"short",year:"2-digit"});
    return`<div style="margin-bottom:10px">
      <div style="font-size:12px;color:#6B6560;margin-bottom:4px;font-weight:500">${lbl}</div>
      <div class="bar-row"><div class="bar-lbl" style="font-size:11px">Income</div><div class="bar-track"><div class="bar-fill inc" style="width:${Math.round(v.income/maxV*100)}%"><span class="bar-val">${fmt(v.income)}</span></div></div></div>
      <div class="bar-row"><div class="bar-lbl" style="font-size:11px">Expense</div><div class="bar-track"><div class="bar-fill exp" style="width:${Math.round(v.expense/maxV*100)}%"><span class="bar-val">${fmt(v.expense)}</span></div></div></div>
    </div>`;
  }).join("");
}

// Init
setType("income");
document.getElementById("f-date").value=new Date().toISOString().split("T")[0];
getStats();
</script>
</body>
</html>
